version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ventas_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:    proy2
      POSTGRES_PASSWORD: secret
      POSTGRES_DB:       ventas_db
    ports:
      - "5432:5432"
    volumes:
      # Persistencia de datos
      - postgres_data:/var/lib/postgresql/data
      # Script de inicialización (se ejecuta solo la primera vez)
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ventas_user -d ventas_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Interfaz web opcional para administrar la BD
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ventas_pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@ventas.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data: